# WHY: By default Kubernetes allows ALL pods to talk to ALL other pods
# across ALL namespaces. This is a huge security risk in a multi-tenant
# setup — tenant-a could directly call tenant-b's internal APIs.
# These policies implement a default-deny stance and only open what's needed.

---
# Step 1: Block all ingress and egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: TENANT_NAME
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Step 2: Allow ingress only from the NGINX ingress controller
# WHY: Tenant pods should only receive traffic via the ingress — not
# directly from other namespaces or pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: TENANT_NAME
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx

---
# Step 3: Allow pods to talk to each other within the same namespace
# WHY: Services within a tenant (e.g. api-service calling worker-service)
# need to communicate internally. This opens intra-namespace traffic only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: TENANT_NAME
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

---
# Step 4: Allow DNS resolution
# WHY: Without this egress rule pods can't resolve service names like
# "api-service.tenant-a.svc.cluster.local" — DNS breaks and services
# can't find each other even within the same namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: TENANT_NAME
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
