# WHY: RBAC controls who can do what inside this namespace.
# Follows least privilege — tenant pods can only read their own resources.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: TENANT_NAME-sa
  namespace: TENANT_NAME
  labels:
    tenant: TENANT_NAME
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: TENANT_NAME-role
  namespace: TENANT_NAME
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: TENANT_NAME-rolebinding
  namespace: TENANT_NAME
subjects:
  - kind: ServiceAccount
    name: TENANT_NAME-sa
    namespace: TENANT_NAME
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: TENANT_NAME-role
