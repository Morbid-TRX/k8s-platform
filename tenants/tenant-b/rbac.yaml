apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-b-sa
  namespace: tenant-b
  labels:
    tenant: tenant-b
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-b-role
  namespace: tenant-b
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-b-rolebinding
  namespace: tenant-b
subjects:
  - kind: ServiceAccount
    name: tenant-b-sa
    namespace: tenant-b
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: tenant-b-role
