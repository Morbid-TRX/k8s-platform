# WHY: kind (Kubernetes IN Docker) runs a full K8s cluster inside Docker
# containers on your machine. This config defines a 1 control plane +
# 2 worker node cluster — closer to real production topology than the
# default single-node setup.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    # WHY: We map ports from your localhost into the control plane node
    # so NGINX ingress can receive traffic from your browser.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker
  - role: worker
