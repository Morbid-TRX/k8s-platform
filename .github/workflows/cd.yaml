name: CD

on:
  push:
    branches: [main]
    paths:
      - "services/**"

env:
  AWS_REGION: ap-southeast-1

jobs:
  build-and-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-service, worker-service]

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          echo "IMAGE_TAG=v$(date +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: >-
            ${{ steps.ecr-login.outputs.registry }}/k8s-platform-dev/${{ matrix.service }}:${{ steps.tag.outputs.IMAGE_TAG }},
            ${{ steps.ecr-login.outputs.registry }}/k8s-platform-dev/${{ matrix.service }}:latest-dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in manifests
        run: |
          sed -i "s|:v.*|:${{ steps.tag.outputs.IMAGE_TAG }}|g" \
            services/${{ matrix.service }}/deployment.yaml

      - name: Commit updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update ${{ matrix.service }} image to ${{ steps.tag.outputs.IMAGE_TAG }}"
          file_pattern: "services/${{ matrix.service }}/deployment.yaml"
