# WHY: Loki aggregates logs without indexing content — only labels.
# Much cheaper on storage and memory than ELK. Perfect for a small cluster.
# Full defaults: https://github.com/grafana/helm-charts/blob/main/charts/loki-stack/values.yaml

loki:
  enabled: true

  persistence:
    enabled: true
    size: 10Gi

  config:
    auth_enabled: false
    # WHY: Multi-tenancy auth is for SaaS scenarios with separate orgs.
    # For our single-team setup it adds complexity with no benefit.

    ingester:
      chunk_idle_period: 3m
      chunk_block_size: 262144
      chunk_retain_period: 1m

    limits_config:
      retention_period: 168h
      # WHY: 168h = 7 days. Matches Prometheus retention for consistency.
      # CHANGE THIS to 720h (30 days) for production.

    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/index
        cache_location: /data/loki/index_cache
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks
        # WHY: Filesystem storage is fine for local and single-node dev.
        # CHANGE THIS to S3 for production:
        # s3:
        #   bucketnames: CHANGE-ME-loki-chunks
        #   region: ap-southeast-1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

promtail:
  enabled: true
  # WHY: Promtail runs as a DaemonSet on every node and ships logs to Loki.

  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

    snippets:
      pipelineStages:
        - cri: {}
        # WHY: cri stage parses the Container Runtime Interface log format.
        # Without this, logs come in as raw strings with no timestamp parsing.

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  tolerations:
    - effect: NoSchedule
      operator: Exists
      # WHY: DaemonSets need this to run on ALL nodes including control plane.

grafana:
  # WHY: Disabled — already installed via prometheus-stack.
  enabled: false
