# WHY: These are overrides for the official ArgoCD Helm chart.
# We only specify what we want to change — everything else uses chart defaults.
# Full defaults: https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml

global:
  domain: argocd.k8s-platform.local

configs:
  params:
    # WHY: We terminate TLS at the ingress level, not inside ArgoCD.
    # Without this ArgoCD redirects HTTP to HTTPS internally and breaks
    # when sitting behind an ingress that already handles TLS.
    server.insecure: true

  cm:
    url: https://argocd.k8s-platform.local
    application.instanceLabelKey: argocd.argoproj.io/app-name

  rbac:
    # WHY: policy.default=role:readonly means anyone who logs in gets
    # read-only access by default. Only admins can make changes.
    policy.default: role:readonly

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.k8s-platform.local
    tls: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

notifications:
  # WHY: Disabled for now — notifications need a Slack/email config.
  enabled: false
