# WHY: NGINX Ingress Controller watches Ingress resources and configures
# routing automatically. Works identically local and on AWS.
# Full defaults: https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/values.yaml

controller:
  service:
    # WHY: NodePort for local (kind) — no external load balancer exists locally.
    # CHANGE THIS to LoadBalancer when deploying to AWS EKS.
    type: NodePort
    # type: LoadBalancer

  # Uncomment for AWS:
  # annotations:
  #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
  #   service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  config:
    # WHY: Passes the real client IP through to your services.
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"

  watchIngressWithoutClass: false
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
