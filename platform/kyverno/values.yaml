# WHY: Kyverno is a Kubernetes-native policy engine. It intercepts every
# resource creation/update via admission webhooks and either blocks it,
# mutates it, or audits it based on your policies.
# Full defaults: https://github.com/kyverno/kyverno/blob/main/charts/kyverno/values.yaml

# CHANGE THIS to 3 for production — single replica is a single point
# of failure for your admission webhook. If Kyverno crashes, pod creation
# blocks cluster-wide until it recovers.
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# WHY: failurePolicy Ignore means pod creation still works even if Kyverno
# is unavailable. For production set to Fail — but only after you have
# 3 replicas for HA.
config:
  webhooks:
    - failurePolicy: Ignore
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            # WHY: Exclude system namespaces — applying policies here can
            # break core K8s components during upgrades.
            values:
              - kube-system
              - kyverno
