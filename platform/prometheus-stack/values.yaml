# WHY: kube-prometheus-stack installs Prometheus, Grafana, and Alertmanager
# together with pre-built Kubernetes dashboards. Installing them separately
# means wiring up service discovery yourself — not worth it.
# Full defaults: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

grafana:
  enabled: true
  # WHY: Hardcoded here for local dev only. Use AWS Secrets Manager in prod.
  adminPassword: "CHANGE-ME-use-a-secret-manager-in-prod"

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      # CHANGE THIS: Update to your domain when deploying to AWS.
      - grafana.k8s-platform.local

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Asia/Kuala_Lumpur

prometheus:
  prometheusSpec:
    retention: 7d

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    # WHY: Scrape ALL namespaces — required for multi-tenant monitoring.
    podMonitorNamespaceSelector:
      matchLabels: {}
    serviceMonitorNamespaceSelector:
      matchLabels: {}

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

kubelet:
  enabled: true
