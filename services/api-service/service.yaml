apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: tenant-a
  labels:
    app: api-service
    environment: dev
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: api-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
      # WHY: Service on 80, container on 8000 — keeps URLs clean.
  type: ClusterIP
  # WHY: ClusterIP — external traffic comes via Ingress, not directly.
