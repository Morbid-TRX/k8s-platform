---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: tenant-a
  labels:
    app: api-service
    environment: dev
  annotations:
    # WHY: ServiceMonitor uses this annotation to configure Prometheus
    # scraping automatically. Without it you'd manually add scrape configs.
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: api-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
      # WHY: Service listens on 80, forwards to container port 8000.
      # Keeps URLs clean (no port in the URL) while the app uses 8000.
  type: ClusterIP
  # WHY: ClusterIP means the service is only reachable inside the cluster.
  # External traffic comes in via Ingress → NGINX → Service → Pod.
  # Never use NodePort or LoadBalancer for app services — use Ingress.
