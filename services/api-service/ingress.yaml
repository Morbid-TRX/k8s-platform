apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-service
  namespace: tenant-a
  labels:
    app: api-service
    environment: dev
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # CHANGE THIS to "true" when TLS is configured via cert-manager
spec:
  ingressClassName: nginx
  rules:
    - host: k8s-platform.local
      # CHANGE THIS: Replace with your actual domain on AWS
      http:
        paths:
          - path: /tenant-a/api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  name: http
