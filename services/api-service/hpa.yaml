apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-service-hpa
  namespace: tenant-a
  labels:
    app: api-service
    environment: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-service
  minReplicas: 2
  maxReplicas: 5
  # WHY: maxReplicas=5 gives enough headroom for traffic spikes without
  # runaway scaling. Adjust based on your ResourceQuota limits in the namespace.
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
          # WHY: Scale up when average CPU across all pods exceeds 70%.
          # 70% leaves headroom before pods get throttled at 100%.
          # Too low (e.g. 50%) causes unnecessary scaling, too high (90%)
          # means pods are already struggling before new ones come up.
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
          # WHY: Memory-based scaling catches memory leaks early.
          # Unlike CPU, memory doesn't drop when you add replicas —
          # so 80% is a good early warning threshold.
