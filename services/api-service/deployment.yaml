apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: tenant-a
  labels:
    app: api-service
    environment: dev
spec:
  replicas: 1
  # WHY: 2 replicas minimum for zero-downtime deployments.
  selector:
    matchLabels:
      app: api-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
      # WHY: maxUnavailable=0 guarantees zero downtime during rollouts.
  template:
    metadata:
      labels:
        app: api-service
        environment: dev
        tenant: tenant-a
    spec:
      serviceAccountName: tenant-a-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api-service
          # CHANGE THIS: Replace with your actual ECR URL from terraform output
          image: k8s-platform/api-service:v1.0.0
          imagePullPolicy: Never
          # WHY: Never means K8s uses the locally loaded image instead of
          # trying to pull from a registry. Required for kind local development.
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: TENANT
              value: "tenant-a"
            - name: ENVIRONMENT
              value: "dev"
            - name: APP_VERSION
              value: "v1.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      # WHY: Spread pods across nodes so one node failure doesn't take down both replicas.
