apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: tenant-a
  labels:
    app: api-service
    environment: dev
spec:
  replicas: 2
  # WHY: 2 replicas minimum for zero-downtime deployments. With 1 replica,
  # rolling updates cause a brief outage as the old pod is replaced.
  selector:
    matchLabels:
      app: api-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
      # WHY: maxUnavailable=0 means never kill an old pod before a new one
      # is healthy. maxSurge=1 allows one extra pod during the rollout.
      # Together: zero downtime deployments guaranteed.
  template:
    metadata:
      labels:
        app: api-service
        environment: dev
        tenant: tenant-a
    spec:
      serviceAccountName: tenant-a-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        # WHY: Matches the appuser UID we created in the Dockerfile.
        # Kyverno policy disallow-root-user enforces this is set.
        fsGroup: 1000

      containers:
        - name: api-service
          image: CHANGE-ME-ECR-URL/k8s-platform-dev/api-service:v1.0.0
          # CHANGE THIS: Replace with your actual ECR URL from terraform output
          ports:
            - containerPort: 8000
              name: http

          env:
            - name: TENANT
              value: "tenant-a"
            - name: ENVIRONMENT
              value: "dev"
            - name: APP_VERSION
              value: "v1.0.0"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
            # WHY: initialDelaySeconds=10 gives the app time to start before
            # K8s starts checking. Too low and the probe fails before the
            # app is ready and K8s restarts it in a crash loop.

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

      # WHY: Spread pods across different nodes so one node failure
      # doesn't take down both replicas simultaneously.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api-service
