apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: tenant-a
  labels:
    app: worker-service
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-service
        environment: dev
        tenant: tenant-a
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: tenant-a-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker-service
          # CHANGE THIS: Replace with your actual ECR URL from terraform output
          image: CHANGE-ME-ECR-URL/k8s-platform-dev/worker-service:v1.0.0
          env:
            - name: TENANT
              value: "tenant-a"
            - name: ENVIRONMENT
              value: "dev"
            - name: APP_VERSION
              value: "v1.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # WHY: Gives K8s time to remove pod from endpoints before SIGTERM.
                command: ["/bin/sh", "-c", "sleep 5"]
